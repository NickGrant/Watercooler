services:
  frontend:
    build:
      context: ./frontend
    working_dir: /app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: ./backend/api
    working_dir: /app
    command: sh -c "composer install --no-interaction && php -S 0.0.0.0:8080 -t public public/index.php"
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      APP_DEBUG: "1"
      APP_URL: http://localhost:8080
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: watercooler
      DB_USER: watercooler
      DB_PASSWORD: watercooler
    volumes:
      - ./backend/api:/app
      - api_vendor:/app/vendor
    depends_on:
      db:
        condition: service_healthy

  realtime:
    build:
      context: ./backend/realtime
    working_dir: /app
    command: sh -c "composer install --no-interaction && php bin/server.php"
    ports:
      - "8090:8090"
    environment:
      APP_ENV: development
      APP_DEBUG: "1"
      REALTIME_HOST: 0.0.0.0
      REALTIME_PORT: 8090
      API_BASE_URL: http://api:8080
      REALTIME_SYNC_INTERVAL_MS: 1000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: watercooler
      DB_USER: watercooler
      DB_PASSWORD: watercooler
    volumes:
      - ./backend/realtime:/app
      - realtime_vendor:/app/vendor
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: watercooler
      MYSQL_USER: watercooler
      MYSQL_PASSWORD: watercooler
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./database/migrations/002_seed_cards_and_executives.sql:/docker-entrypoint-initdb.d/002_seed_cards_and_executives.sql:ro

volumes:
  frontend_node_modules:
  api_vendor:
  realtime_vendor:
  db_data:
