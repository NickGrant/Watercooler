<div
  class="avatar-composite"
  [class.avatar-composite--small]="size() === 'small'"
  [class.avatar-composite--medium]="size() === 'medium'"
  [class.avatar-composite--large]="size() === 'large'"
  [class.avatar-composite--xlarge]="size() === 'xlarge'"
  [attr.aria-label]="ariaLabel()"
  role="img"
>
  <img class="avatar-composite__image" [src]="imagePath()" alt="" aria-hidden="true" />
</div>
