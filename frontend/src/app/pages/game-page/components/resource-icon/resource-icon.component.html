<span
  class="resource-icon-badge"
  [class.resource-icon-badge--small]="variant() === 'small'"
  [class.resource-icon-badge--medium]="variant() === 'medium'"
  [class.resource-icon-badge--large]="variant() === 'large'"
  [attr.aria-label]="decorative() ? null : accessibilityLabel()"
>
  <img
    class="resource-icon-badge__image"
    [src]="src()"
    [alt]="decorative() ? '' : label()"
    [attr.aria-hidden]="decorative() ? 'true' : null"
  />

  @if (value() !== null && value() !== undefined && value() !== '') {
    <strong class="resource-icon-badge__value">{{ value() }}</strong>
  }
</span>
