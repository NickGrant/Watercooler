@if (variant() === 'market') {
  <article class="market-card">
    <div class="market-card__meta">
      <span
        class="resource-reference"
        [matTooltip]="'Discount: ' + resourceLabel()(card().resourceDiscount)"
        [attr.aria-label]="'Discount: ' + resourceLabel()(card().resourceDiscount)"
      >
        <app-resource-icon
          [src]="resourceIconPath()(card().resourceDiscount)"
          [label]="resourceLabel()(card().resourceDiscount)"
          variant="small"
          [decorative]="true"
        />
      </span>
      <strong>Prestige {{ card().officePrestige }}</strong>
    </div>
    <h4>{{ card().name }}</h4>
    <div class="cost-row">
      @for (entry of resourceEntries(); track entry[0]) {
        <span
          class="resource-cost"
          [matTooltip]="resourceLabel()(entry[0]) + ': ' + entry[1]"
          [attr.aria-label]="resourceLabel()(entry[0]) + ' ' + entry[1]"
        >
          <app-resource-icon
            [src]="resourceIconPath()(entry[0])"
            [label]="resourceLabel()(entry[0])"
            [value]="entry[1]"
            variant="small"
            [decorative]="true"
          />
        </span>
      }
    </div>
    <div class="market-card__actions">
      <button
        mat-button
        type="button"
        [disabled]="isCompletedGame() || actionPending() || !canAct()"
        (click)="onClaim()"
      >
        Claim Project
      </button>
      <button
        mat-flat-button
        type="button"
        [disabled]="isCompletedGame() || actionPending() || !canAct() || !canPurchase()"
        (click)="onPurchase()"
      >
        Complete Project
      </button>
    </div>
  </article>
} @else {
  <article class="mini-card">
    <div class="mini-card__header">
      <strong>{{ card().name }}</strong>
      <span
        class="resource-reference"
        [matTooltip]="resourceLabel()(card().resourceDiscount) + ' discount'"
        [attr.aria-label]="resourceLabel()(card().resourceDiscount) + ' discount'"
      >
        <app-resource-icon
          [src]="resourceIconPath()(card().resourceDiscount)"
          [label]="resourceLabel()(card().resourceDiscount)"
          variant="small"
          [decorative]="true"
        />
      </span>
    </div>
    <p>Prestige {{ card().officePrestige }}</p>
    <div class="cost-row cost-row--mini">
      @for (entry of resourceEntries(); track entry[0]) {
        <span
          class="resource-cost"
          [matTooltip]="resourceLabel()(entry[0]) + ': ' + entry[1]"
          [attr.aria-label]="resourceLabel()(entry[0]) + ' ' + entry[1]"
        >
          <app-resource-icon
            [src]="resourceIconPath()(entry[0])"
            [label]="resourceLabel()(entry[0])"
            [value]="entry[1]"
            variant="small"
            [decorative]="true"
          />
        </span>
      }
    </div>
    <button
      mat-button
      type="button"
      [disabled]="isCompletedGame() || actionPending() || !canAct() || !canPurchase()"
      (click)="onPurchase()"
    >
      Complete From Tray
    </button>
  </article>
}
